version: 0.0
os: linux
files:
  - source: app.jar
    destination: /opt/plate-main/
hooks:
  ApplicationStop:
    - location: deploy/application_stop.sh
      timeout: 90
      runas: root
  BeforeInstall:
    - location: deploy/before_install.sh
      timeout: 90
      runas: root
  AfterInstall:
    - location: deploy/after_install.sh
      timeout: 60
      runas: root
  ApplicationStart:
    - location: deploy/application_start.sh
      timeout: 180
      runas: root
  ValidateService:
    - location: deploy/validate_service.sh
      timeout: 240
      runas: root
