debug: false

spring:
  main:
    banner-mode: off
  datasource:
    url: jdbc:h2:mem:plate_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    open-in-view: false
  flyway:
    enabled: false

google:
  client-id: test-google-client
  android-client-id: test-google-android-client
  allowed-client-ids:

apple:
  client-id: test-apple-client

jwt:
  access-expire: 3600000
  refresh-expire: 1209600000
  secret: test-jwt-secret-key-for-context-load-32bytes

firebase:
  enabled: false

logging:
  level:
    root: WARN
    org.hibernate.dialect.Dialect: ERROR
    org.hibernate.orm.deprecation: ERROR
    org.hibernate.SQL: WARN
    org.springframework.boot.autoconfigure: WARN
    org.springframework.boot.autoconfigure.orm.jpa.JpaBaseConfiguration$JpaWebConfiguration: ERROR
    org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration: ERROR
    org.springframework.test.context: WARN
