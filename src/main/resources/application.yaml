spring:
  application:
    name: foodPlayerServer

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/mainproject_2}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver

  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    hibernate:
      ddl-auto: validate
    show-sql: ${JPA_SHOW_SQL:false}

  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 150MB

  security:
    oauth2:
      client:
        registration:
          naver:
            client-name: naver
            # client-id:
            # client-secret:
            redirect-uri: http://localhost:8080/login/oauth2/code/naver
            authorization-grant-type: authorization_code
            scope: name,email
          google:
            client-name: google
            # client-id:
            # client-secret:
            redirect-uri: http://localhost:8080/login/oauth2/code/google
            authorization-grant-type: authorization_code
            scope:
              - profile
              - email
        provider:
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response

  mail:
    host: smtp.sendgrid.net
    port: 587
    username: apikey
    # password:
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

mybatis:
  mapper-locations: classpath:mapper/*.xml

server:
  port: ${SERVER_PORT:8090}
  tomcat:
    uri-encoding: UTF-8
  error:
    include-stacktrace: ${SERVER_ERROR_INCLUDE_STACKTRACE:never}
  servlet:
    encoding:
      charset: UTF-8
      force: true
      enabled: true

jwt:
  access-expire: 3600000        # 1 hour in ms
  refresh-expire: 1209600000    # 14 days in ms
  secret: ${JWT_SECRET}

file:
  upload:
    path: "C:\\localFileUpload"

# Kakao auth redirect (override via env if needed)
KAKAO_DEV_REDIRECT_URL: "http://localhost:3000/RedirectPage"
# KAKAO_DEV_RESTAPI_KEY:
KAKAO_TOKEN_URI: "https://kauth.kakao.com/oauth/token"
# KAKAO_CLIENT_SECRET:

aws:
  # accessKeyId:
  # secretKey:
  s3:
    region: ap-northeast-2
    bucket: foodplayerbucket
    base-url: https://foodplayerbucket.s3.ap-northeast-2.amazonaws.com
    cdn-base-url: ${AWS_S3_CDN_BASE_URL:}
    videoFilePath: foodvideos/
    imageFilePath: foodimages/
    feedImagePath: FeedImages/
    profileImagePath: profileImage/
    restaurantFilePath: restaurants/
    newsImagePath: newsImage/
    migration:
      old-prefix: profileImage/
      move-enabled: true
      include-http: true

logging:
  level:
    org.springframework.web.servlet: ${LOG_LEVEL_SPRING_WEB:INFO}
    org.springframework.web.method.annotation: ${LOG_LEVEL_SPRING_WEB_METHOD:INFO}
    org.springframework.web.servlet.mvc.method.annotation.ExceptionHandlerExceptionResolver: ${LOG_LEVEL_EXCEPTION_HANDLER:INFO}
    com.plateapp.plate_main.friend: ${LOG_LEVEL_FRIEND:INFO}
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} [requestId=%X{requestId}] - %msg%n%wEx"

management:
  endpoints:
    web:
      exposure:
        include: ${MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE:health,info}
  endpoint:
    health:
      show-details: ${MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS:never}

springdoc:
  api-docs:
    enabled: ${SPRINGDOC_API_DOCS_ENABLED:false}
  swagger-ui:
    enabled: ${SPRINGDOC_SWAGGER_UI_ENABLED:false}

openai:
  # api-key:

apple:
  client-id: ${APPLE_CLIENT_ID:}

google:
  client-id: ${GOOGLE_CLIENT_ID:}
  android-client-id: ${GOOGLE_ANDROID_CLIENT_ID:398195276422-4hosgi2odjcq47hoqhrk5lc37eo5dcbi.apps.googleusercontent.com}
  allowed-client-ids: ${GOOGLE_ALLOWED_CLIENT_IDS:}

firebase:
  enabled: ${FIREBASE_ENABLED:false}
  project-id: ${FIREBASE_PROJECT_ID:}
  service-account-path: ${FIREBASE_SERVICE_ACCOUNT_PATH:}
