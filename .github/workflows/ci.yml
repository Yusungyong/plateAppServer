name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DEBUG: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Prepare mvnw
        run: chmod +x mvnw

      - name: Test and package
        run: ./mvnw -B -Ddebug=false clean package

      - name: Upload app jar
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar
          if-no-files-found: error
          retention-days: 3
