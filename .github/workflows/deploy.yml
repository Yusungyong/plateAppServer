name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches: ["main"]

permissions:
  id-token: write
  contents: read
  actions: read

env:
  AWS_REGION: ap-northeast-2
  S3_BUCKET: foodplayerbucket
  ROLE_ARN: arn:aws:iam::174977828951:role/GitHubActions-CodeDeploy
  EC2_INSTANCE_ID: i-030405301637ebd87
  SSM_WAIT_ATTEMPTS: "60"
  SSM_WAIT_SECONDS: "5"

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          persist-credentials: false

      - name: Download tested app jar
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: app-jar
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}
          path: build-artifact

      - name: Prepare app jar
        run: |
          set -euo pipefail
          jar_count="$(find build-artifact -maxdepth 1 -type f -name '*.jar' | wc -l | tr -d ' ')"
          if [ "${jar_count}" != "1" ]; then
            echo "Expected exactly one jar artifact, found ${jar_count}."
            find build-artifact -maxdepth 2 -type f -print
            exit 1
          fi
          cp "$(find build-artifact -maxdepth 1 -type f -name '*.jar' -print -quit)" app.jar

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: ${{ env.ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload to S3
        run: aws s3api put-object --bucket ${{ env.S3_BUCKET }} --key deployments/${{ github.event.workflow_run.head_sha }}/app.jar --body app.jar

      - name: Deploy with SSM
        run: |
          set -euo pipefail
          app_s3_uri="s3://${S3_BUCKET}/deployments/${{ github.event.workflow_run.head_sha }}/app.jar"
          app_download_url="$(aws s3 presign "${app_s3_uri}" --expires-in 900)"
          parameters_file="$(mktemp)"
          APP_DOWNLOAD_URL="${app_download_url}" python3 - <<'PY' > "${parameters_file}"
          import json
          import os
          import sys

          app_download_url = os.environ["APP_DOWNLOAD_URL"]
          deploy_script = f"""set -euo pipefail

          log() {{
            echo "[$(date '+%Y-%m-%d %H:%M:%S %Z')] [ssm_deploy] $*"
          }}

          print_service_diagnostics() {{
            log "plate-main status"
            systemctl status plate-main -l --no-pager || true

            log "plate-main recent journal tail"
            journalctl -u plate-main -n 160 --no-pager || true

            log "plate-main root-cause candidates from journal"
            journalctl -u plate-main -n 1000 --no-pager -o cat 2>/dev/null \\
              | grep -Ei "Caused by|Schema-validation|missing column|missing table|Flyway|Validate failed|BeanCreationException|PersistenceException|PSQLException|Exception|ERROR" \\
              | tail -n 80 || true
          }}

          APP_DIR="/opt/plate-main"
          ENV_FILE="/etc/plate-main.env"
          TMP_JAR="/tmp/plate-main-app.jar"
          BACKUP_JAR="${{APP_DIR}}/app.jar.previous"
          APP_URL=""

          log "Preparing app directory: ${{APP_DIR}}"
          mkdir -p "${{APP_DIR}}"

          log "Downloading app jar from presigned S3 URL"
          curl -fL --retry 3 --retry-delay 2 --connect-timeout 10 --max-time 300 -o "${{TMP_JAR}}" "{app_download_url}"
          chown ec2-user:ec2-user "${{TMP_JAR}}" || true
          chmod 0640 "${{TMP_JAR}}"

          if [ -f "${{APP_DIR}}/app.jar" ]; then
            cp -f "${{APP_DIR}}/app.jar" "${{BACKUP_JAR}}"
          fi
          mv -f "${{TMP_JAR}}" "${{APP_DIR}}/app.jar"
          chown ec2-user:ec2-user "${{APP_DIR}}/app.jar" || true
          chmod 0640 "${{APP_DIR}}/app.jar"

          log "Writing systemd service"
          cat <<'SERVICE_EOF' > /etc/systemd/system/plate-main.service
          [Unit]
          Description=plate-main service
          After=network.target

          [Service]
          Type=simple
          User=ec2-user
          WorkingDirectory=/opt/plate-main
          EnvironmentFile=/etc/plate-main.env
          ExecStart=/usr/bin/java -jar /opt/plate-main/app.jar
          Restart=on-failure
          RestartSec=5
          TimeoutStartSec=90
          TimeoutStopSec=25
          KillMode=control-group
          SendSIGKILL=yes
          SuccessExitStatus=143
          NoNewPrivileges=true
          PrivateTmp=true
          ProtectSystem=full
          ProtectKernelTunables=true
          ProtectKernelModules=true
          ProtectControlGroups=true
          RestrictSUIDSGID=true
          UMask=0027
          StandardOutput=journal
          StandardError=journal

          [Install]
          WantedBy=multi-user.target
          SERVICE_EOF

          systemctl daemon-reload
          systemctl enable plate-main

          log "Restarting plate-main"
          systemctl restart plate-main

          if [ -f "${{ENV_FILE}}" ]; then
            set -a
            . "${{ENV_FILE}}"
            set +a
          fi
          SERVER_PORT="${{SERVER_PORT:-8090}}"
          HEALTH_MAX_RETRIES="${{HEALTH_MAX_RETRIES:-90}}"
          HEALTH_SLEEP_SECONDS="${{HEALTH_SLEEP_SECONDS:-2}}"
          HEALTH_CURL_TIMEOUT_SECONDS="${{HEALTH_CURL_TIMEOUT_SECONDS:-5}}"
          APP_URL="http://127.0.0.1:${{SERVER_PORT}}/actuator/health/readiness"

          log "Waiting for readiness: ${{APP_URL}} max_retries=${{HEALTH_MAX_RETRIES}} sleep_seconds=${{HEALTH_SLEEP_SECONDS}}"
          for i in $(seq 1 "${{HEALTH_MAX_RETRIES}}"); do
            if systemctl is-failed --quiet plate-main; then
              log "plate-main entered failed state"
              print_service_diagnostics
              exit 1
            fi

            http_code="$(curl -sS -o /tmp/plate-main-health.out -w "%{{http_code}}" --max-time "${{HEALTH_CURL_TIMEOUT_SECONDS}}" "${{APP_URL}}" || true)"
            if [ "${{http_code}}" = "200" ]; then
              log "Readiness check succeeded"
              systemctl status plate-main -l --no-pager || true
              exit 0
            fi

            log "Readiness attempt ${{i}}/${{HEALTH_MAX_RETRIES}} failed with http_code=${{http_code}}"
            sleep "${{HEALTH_SLEEP_SECONDS}}"
          done

          log "Readiness check failed after ${{HEALTH_MAX_RETRIES}} attempts"
          if [ -s /tmp/plate-main-health.out ]; then
            log "Last health response body"
            tail -c 2000 /tmp/plate-main-health.out || true
          fi
          print_service_diagnostics
          exit 1
          """

          json.dump({"commands": [deploy_script], "executionTimeout": ["900"]}, fp=sys.stdout)
          PY

          command_id="$(
            aws ssm send-command \
              --instance-ids "${EC2_INSTANCE_ID}" \
              --document-name "AWS-RunShellScript" \
              --comment "GitHub Actions deploy ${{ github.event.workflow_run.head_sha }}" \
              --parameters "file://${parameters_file}" \
              --query "Command.CommandId" \
              --output text
          )"
          echo "Created SSM command: ${command_id}"

          for attempt in $(seq 1 "${SSM_WAIT_ATTEMPTS}"); do
            status="$(
              aws ssm get-command-invocation \
                --command-id "${command_id}" \
                --instance-id "${EC2_INSTANCE_ID}" \
                --query "Status" \
                --output text 2>/dev/null || true
            )"
            status="${status:-Pending}"
            echo "[$(date -u '+%Y-%m-%dT%H:%M:%SZ')] attempt=${attempt}/${SSM_WAIT_ATTEMPTS} status=${status}"

            case "${status}" in
              Succeeded)
                aws ssm get-command-invocation \
                  --command-id "${command_id}" \
                  --instance-id "${EC2_INSTANCE_ID}" \
                  --query "{Status:Status,ResponseCode:ResponseCode,StandardOutputContent:StandardOutputContent,StandardErrorContent:StandardErrorContent}" \
                  --output json
                exit 0
                ;;
              Failed|Cancelled|TimedOut|Cancelling)
                aws ssm get-command-invocation \
                  --command-id "${command_id}" \
                  --instance-id "${EC2_INSTANCE_ID}" \
                  --query "{Status:Status,ResponseCode:ResponseCode,StandardOutputContent:StandardOutputContent,StandardErrorContent:StandardErrorContent}" \
                  --output json || true
                exit 1
                ;;
            esac

            sleep "${SSM_WAIT_SECONDS}"
          done

          echo "Timed out waiting for SSM command: ${command_id}"
          aws ssm get-command-invocation \
            --command-id "${command_id}" \
            --instance-id "${EC2_INSTANCE_ID}" \
            --query "{Status:Status,ResponseCode:ResponseCode,StandardOutputContent:StandardOutputContent,StandardErrorContent:StandardErrorContent}" \
            --output json || true
          exit 1
