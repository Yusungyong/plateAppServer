name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches: ["main"]

permissions:
  id-token: write
  contents: read
  actions: read

env:
  AWS_REGION: ap-northeast-2
  S3_BUCKET: foodplayerbucket
  CODEDEPLOY_APP: plate-app-server
  CODEDEPLOY_GROUP: plate-main-deploy-group
  ROLE_ARN: arn:aws:iam::174977828951:role/GitHubActions-CodeDeploy
  CODEDEPLOY_WAIT_ATTEMPTS: "90"
  CODEDEPLOY_WAIT_SECONDS: "5"
  # Recover from the previous revision's stuck ApplicationStop hook.
  # ApplicationStart restarts the service after the new revision is installed.
  CODEDEPLOY_IGNORE_APPLICATION_STOP_FAILURES: "true"

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          persist-credentials: false

      - name: Download tested app jar
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: app-jar
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}
          path: build-artifact

      - name: Prepare scripts
        run: chmod +x deploy/*.sh

      - name: Prepare bundle
        run: |
          set -euo pipefail
          jar_count="$(find build-artifact -maxdepth 1 -type f -name '*.jar' | wc -l | tr -d ' ')"
          if [ "${jar_count}" != "1" ]; then
            echo "Expected exactly one jar artifact, found ${jar_count}."
            find build-artifact -maxdepth 2 -type f -print
            exit 1
          fi
          cp "$(find build-artifact -maxdepth 1 -type f -name '*.jar' -print -quit)" app.jar

      - name: Package deployment bundle
        run: zip -r deployment.zip appspec.yml deploy app.jar

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: ${{ env.ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload to S3
        run: aws s3api put-object --bucket ${{ env.S3_BUCKET }} --key deployments/${{ github.event.workflow_run.head_sha }}.zip --body deployment.zip

      - name: Create CodeDeploy deployment
        id: codedeploy
        run: |
          set -euo pipefail
          create_args=()
          if [ "${CODEDEPLOY_IGNORE_APPLICATION_STOP_FAILURES}" = "true" ]; then
            create_args+=(--ignore-application-stop-failures)
            echo "ApplicationStop failures will not block this deployment."
          fi

          deployment_id=$(
            aws deploy create-deployment \
              --application-name "${{ env.CODEDEPLOY_APP }}" \
              --deployment-group-name "${{ env.CODEDEPLOY_GROUP }}" \
              --s3-location "bucket=${{ env.S3_BUCKET }},key=deployments/${{ github.event.workflow_run.head_sha }}.zip,bundleType=zip" \
              --file-exists-behavior OVERWRITE \
              --description "GitHub Actions deploy ${{ github.event.workflow_run.head_sha }}" \
              "${create_args[@]}" \
              --query deploymentId \
              --output text
          )
          echo "deployment_id=${deployment_id}" >> "$GITHUB_OUTPUT"
          echo "Created CodeDeploy deployment: ${deployment_id}"

      - name: Wait for CodeDeploy deployment
        run: |
          set -euo pipefail
          deployment_id="${{ steps.codedeploy.outputs.deployment_id }}"
          echo "Waiting for CodeDeploy deployment: ${deployment_id}"

          print_deployment_diagnostics() {
            echo "::group::CodeDeploy deployment details"
            aws deploy get-deployment --deployment-id "${deployment_id}" --output json || true
            echo "::endgroup::"

            target_error_file="$(mktemp)"
            target_ids="$(aws deploy list-deployment-targets --deployment-id "${deployment_id}" --query 'targetIds[]' --output text 2>"${target_error_file}" || true)"
            if [ -s "${target_error_file}" ]; then
              echo "CodeDeploy target diagnostics are unavailable. Grant codedeploy:ListDeploymentTargets and codedeploy:BatchGetDeploymentTargets to ${{ env.ROLE_ARN }}."
              sed 's/^/AWS diagnostic permission error: /' "${target_error_file}"
            fi
            if [ -n "${target_ids}" ] && [ "${target_ids}" != "None" ]; then
              echo "CodeDeploy target IDs: ${target_ids}"
              echo "CodeDeploy target lifecycle summary"
              # shellcheck disable=SC2086
              aws deploy batch-get-deployment-targets \
                --deployment-id "${deployment_id}" \
                --target-ids ${target_ids} \
                --query 'deploymentTargets[].{type:deploymentTargetType,targetId:instanceTarget.targetId,status:instanceTarget.status,lastUpdatedAt:instanceTarget.lastUpdatedAt,lifecycleEvents:instanceTarget.lifecycleEvents[].{name:lifecycleEventName,status:status,script:diagnostics.scriptName,error:diagnostics.errorCode,message:diagnostics.message,logTail:diagnostics.logTail}}' \
                --output json || true
              echo "::group::CodeDeploy target diagnostics"
              # shellcheck disable=SC2086
              aws deploy batch-get-deployment-targets --deployment-id "${deployment_id}" --target-ids ${target_ids} --output json || true
              echo "::endgroup::"
            else
              echo "No CodeDeploy target IDs were returned for ${deployment_id}."
            fi

            instance_error_file="$(mktemp)"
            instance_ids="$(aws deploy list-deployment-instances --deployment-id "${deployment_id}" --query 'instancesList[]' --output text 2>"${instance_error_file}" || true)"
            if [ -s "${instance_error_file}" ]; then
              echo "CodeDeploy EC2 instance diagnostics are unavailable. Grant codedeploy:ListDeploymentInstances and codedeploy:GetDeploymentInstance to ${{ env.ROLE_ARN }}."
              sed 's/^/AWS diagnostic permission error: /' "${instance_error_file}"
            fi
            if [ -n "${instance_ids}" ] && [ "${instance_ids}" != "None" ]; then
              echo "CodeDeploy EC2 instance IDs: ${instance_ids}"
              echo "CodeDeploy EC2 lifecycle summary"
              for instance_id in ${instance_ids}; do
                echo "Deployment instance lifecycle summary for ${instance_id}"
                aws deploy get-deployment-instance \
                  --deployment-id "${deployment_id}" \
                  --instance-id "${instance_id}" \
                  --query 'instanceSummary.lifecycleEvents[].{name:lifecycleEventName,status:status,script:diagnostics.scriptName,error:diagnostics.errorCode,message:diagnostics.message,logTail:diagnostics.logTail}' \
                  --output json || true
              done
              echo "::group::CodeDeploy EC2 instance diagnostics"
              for instance_id in ${instance_ids}; do
                echo "Deployment instance diagnostics for ${instance_id}"
                aws deploy get-deployment-instance --deployment-id "${deployment_id}" --instance-id "${instance_id}" --output json || true
              done
              echo "::endgroup::"
            else
              echo "No CodeDeploy EC2 instance IDs were returned for ${deployment_id}."
            fi
          }

          for attempt in $(seq 1 "${CODEDEPLOY_WAIT_ATTEMPTS}"); do
            read -r status pending in_progress succeeded failed skipped ready < <(
              aws deploy get-deployment \
                --deployment-id "${deployment_id}" \
                --query 'deploymentInfo.[status,deploymentOverview.Pending,deploymentOverview.InProgress,deploymentOverview.Succeeded,deploymentOverview.Failed,deploymentOverview.Skipped,deploymentOverview.Ready]' \
                --output text
            )
            echo "[$(date -u '+%Y-%m-%dT%H:%M:%SZ')] attempt=${attempt}/${CODEDEPLOY_WAIT_ATTEMPTS} status=${status} overview={Pending:${pending},InProgress:${in_progress},Succeeded:${succeeded},Failed:${failed},Skipped:${skipped},Ready:${ready}}"

            case "${status}" in
              Succeeded)
                echo "CodeDeploy deployment succeeded: ${deployment_id}"
                exit 0
                ;;
              Failed|Stopped)
                echo "CodeDeploy deployment ${status}: ${deployment_id}"
                aws deploy get-deployment --deployment-id "${deployment_id}" --query 'deploymentInfo.errorInformation' --output json || true
                print_deployment_diagnostics
                exit 1
                ;;
            esac

            sleep "${CODEDEPLOY_WAIT_SECONDS}"
          done

          echo "Timed out waiting for CodeDeploy deployment: ${deployment_id}"
          print_deployment_diagnostics
          exit 1
